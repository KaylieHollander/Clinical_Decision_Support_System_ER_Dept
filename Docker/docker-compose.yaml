version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: er_cdss_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/data_schema.sql
    restart: unless-stopped

volumes:
  pgdata: